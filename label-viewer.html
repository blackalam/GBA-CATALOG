<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Label Viewer</title>
    <style>
        :root {
            --aloe-green: #3d5245;
            --accent-sage: #8ba88e;
            --silk-cream: #fafaf7;
            --text-dark: #2c312e;
        }

        body {
            background-color: #dcdcdc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        /* Fixed Dimensions: 250mm x 155mm */
        .mattress-label {
            width: 250mm;
            height: 155mm;
            background-color: var(--silk-cream);
            padding: 10mm;
            border: 1px solid #e2e2e2;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            position: relative;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            outline: 2px dashed #ccc;
            outline-offset: -4px;
        }

        header {
            text-align: center;
            margin-bottom: 6mm;
        }

        .brand-name {
            font-family: 'Times New Roman', serif;
            font-size: 38pt;
            letter-spacing: 4px;
            color: var(--aloe-green);
            margin: 0;
            font-weight: 400;
        }

        .tagline {
            font-size: 9pt;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--accent-sage);
            margin-top: 4px;
        }

        .model-section {
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .comfort-badge {
            display: inline-block;
            border: 1px solid var(--aloe-green);
            padding: 3px 12px;
            font-size: 8pt;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 auto 10px auto;
            color: var(--aloe-green);
        }

        .model-name {
            font-family: 'Georgia', serif;
            font-size: 64pt;
            margin: 0;
            color: var(--text-dark);
            letter-spacing: -1px;
            line-height: 1;
        }

        .aloe-subtitle {
            font-size: 10.5pt;
            letter-spacing: 3.5px;
            text-transform: uppercase;
            color: var(--accent-sage);
            margin-top: 8px;
            font-weight: 500;
        }

        .specs-grid {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #eee;
            padding-top: 8mm;
            margin-bottom: 12mm;
        }

        .spec-item {
            text-align: center;
            flex: 1;
        }

        .icon-box {
            height: 30px;
            margin-bottom: 8px;
            color: var(--aloe-green);
            font-size: 24pt;
        }

        .spec-label {
            font-size: 7.5pt;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.3;
            color: #666;
            max-width: 80px;
            margin: 0 auto;
        }

        footer {
            background-color: var(--aloe-green);
            margin: 0 -10mm -10mm -10mm;
            padding: 22px 18mm;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 10pt;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .footer-left span {
            margin-right: 25px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 4px 12px;
            font-weight: 600;
        }

        .uk-flag {
            color: #fff;
            font-weight: 700;
        }

        /* PRINT STYLES */
        @media print {
            body { background: white !important; display: block; height: auto; align-items: flex-start; justify-content: flex-start;}
            .mattress-label { box-shadow: none !important; margin: 0 !important; page-break-after: always; outline: none; }
            .no-print { display: none !important; }
        }
        
        .action-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 15px;
            z-index: 999;
        }
        .action-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(37,99,235,0.4);
        }
    </style>
</head>
<body>

    <div class="action-container no-print">
        <button class="action-btn" onclick="window.print()">Print Label (PDF)</button>
    </div>

    <div class="mattress-label" id="labelContainer" style="display:none;">
        <header>
            <h1 class="brand-name" id="lBrand"></h1>
            <div class="tagline" id="lTagline"></div>
        </header>

        <section class="model-section">
            <div class="comfort-badge" id="lComfort"></div>
            <h2 class="model-name" id="lModel"></h2>
            <div class="aloe-subtitle" id="lSubtitle"></div>
        </section>

        <section class="specs-grid" id="lSpecs"></section>

        <footer>
            <div class="footer-left" id="lFooterLeft"></div>
            <div class="uk-flag" id="lFooterRight"></div>
        </footer>
    </div>

    <script>
        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const labelId = urlParams.get('id');

            if (!labelId) {
                document.body.innerHTML = "<h1>No label ID provided.</h1>";
                return;
            }

            try {
                const res = await fetch('/api/catalog');
                const data = await res.json();
                
                // Find label
                const labelData = (data.labels || []).find(l => l.id === labelId);
                if (!labelData) {
                    document.body.innerHTML = "<h1>Label not found.</h1>";
                    return;
                }

                // Populate
                document.getElementById('lBrand').innerText = labelData.brand || "Brand";
                document.getElementById('lTagline').innerText = labelData.tagline || "";
                document.getElementById('lComfort').innerText = labelData.comfort || "";
                document.getElementById('lModel').innerText = labelData.model || "";
                document.getElementById('lSubtitle').innerText = labelData.subtitle || "";
                
                // Footer Left Spans
                let footerLHTML = '';
                if(labelData.footerL1) footerLHTML += `<span>${labelData.footerL1}</span>`;
                if(labelData.footerL2) footerLHTML += `<span>${labelData.footerL2}</span>`;
                document.getElementById('lFooterLeft').innerHTML = footerLHTML;
                
                document.getElementById('lFooterRight').innerText = labelData.footerRight || "";

                // Specs
                let specsHTML = "";
                if(labelData.specs) {
                    labelData.specs.forEach(s => {
                        specsHTML += `
                        <div class="spec-item">
                            <div class="icon-box">${s.icon}</div>
                            <div class="spec-label">${s.text}</div>
                        </div>`;
                    });
                }
                document.getElementById('lSpecs').innerHTML = specsHTML;

                document.getElementById('labelContainer').style.display = 'flex';
                document.title = `Label: ${labelData.model || labelData.id}`;

            } catch(e) {
                console.error(e);
                document.body.innerHTML = "<h1>Error loading label data.</h1>";
            }
        }

        init();
    </script>
</body>
</html>
